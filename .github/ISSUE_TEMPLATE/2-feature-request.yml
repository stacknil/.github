name: Feature request
description: Propose a scoped improvement
title: "[Feature] "
body:
  - type: markdown
    attributes:
      value: |
        Use this form for scoped, repository-relevant improvements.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation are you hitting?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What should be added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you evaluate?

  - type: textarea
    id: tradeoffs
    attributes:
      label: Scope and trade-offs
      description: Cost, complexity, compatibility, maintenance impact
