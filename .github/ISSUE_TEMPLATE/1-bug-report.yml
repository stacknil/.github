name: Bug report
description: Report a reproducible problem
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        Please provide a minimal, technically useful report.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
      placeholder: Clear and minimal problem statement
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproduction path
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment / version / commit
      placeholder: e.g. Python 3.12, Ubuntu 24.04, main@abcdef

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots / extra context
      render: shell
